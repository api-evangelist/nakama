meters:
- name: managed_nodes
  description: Managed Nakama compute nodes provisioned on Heroic Cloud.
  unit: nodes
  aggregation: max
  dimensions:
  - project
  - region
- name: concurrent_users
  description: Peak concurrent connected users (CCU), the primary Heroic Cloud scaling dimension.
  unit: concurrent_users
  aggregation: max
  dimensions:
  - project
- name: database_capacity
  description: Managed database storage and capacity provisioned for the project.
  unit: gigabytes
  aggregation: max
  dimensions:
  - project
- name: realtime_messages
  description: Realtime socket message volume across chat, matches, and matchmaking (a load/cost driver).
  unit: messages
  aggregation: sum
  dimensions:
  - project
- name: egress_bandwidth
  description: Outbound network bandwidth from the deployment.
  unit: gigabytes
  aggregation: sum
  dimensions:
  - project
  - region
- name: self_hosted_compute
  description: For self-hosting, underlying cloud compute hours for Nakama server nodes.
  unit: hours
  aggregation: sum
  dimensions:
  - account
  - region
principles:
- name: Visibility
  description: For Heroic Cloud, track tier inclusions vs. peak CCU and database growth; for self-hosting, tag and meter Nakama node and database spend in your cloud bill.
- name: Allocation
  description: Map deployments and projects to titles/teams; separate environments (dev, staging, prod) to attribute cost.
- name: Optimization
  description: Right-size node count and database capacity to actual CCU; prune storage collections and notification retention; consider self-hosting vs. managed based on scale and ops capacity.
- name: Accountability
  description: Assign owners per project/title; review CCU trend and database growth monthly against budget and tier limits.

description: >-
  FinOps view of running Nakama. Because Nakama is open source (Apache-2.0),
  the cost model splits in two. Self-hosting has no software license fee; spend
  is your own compute (Nakama server nodes), the PostgreSQL/CockroachDB
  database, storage, egress, and operations labor. Managed usage runs on Heroic
  Cloud, billed as a tiered monthly subscription (Nakama nodes, database
  capacity, concurrent-user allowance, support) with scaling above the included
  allotments. The main cost drivers are concurrent users, realtime message
  volume, database size and IOPS, and node count.
notes: >-
  Amounts are tier- and infrastructure-dependent and not reconciled here.
  For self-hosting, meter your own cloud bill; for Heroic Cloud, confirm tier
  inclusions and overage rates with Heroic Labs.

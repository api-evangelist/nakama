  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://heroiclabs.com/docs/nakama/concepts/leaderboards/
  baseURL: http://127.0.0.1:7350/v2
  properties:
  - url: https://heroiclabs.com/docs/nakama/concepts/leaderboards/
    type: Documentation
  - url: https://heroiclabs.com/docs/nakama/concepts/tournaments/
    type: Documentation
  - url: openapi/nakama-openapi.yml
    type: OpenAPI
  description: Writes and lists leaderboard records (including records around an owner
    or filtered to friends), and lists, joins, and submits scores to recurring or
    one-off tournaments with configurable reset schedules, categories, and reward
    handling.
- aid: nakama:nakama-notifications-api
  name: Nakama Notifications API
  tags:
  - Notifications
  - Messaging
  - Push
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://heroiclabs.com/docs/nakama/concepts/in-app-notifications/
  baseURL: http://127.0.0.1:7350/v2
  properties:
  - url: https://heroiclabs.com/docs/nakama/concepts/in-app-notifications/
    type: Documentation
  - url: openapi/nakama-openapi.yml
    type: OpenAPI
  description: Lists and deletes a user's in-app notifications with cursor-based
    pagination. Notifications are delivered in realtime over the socket when the
    user is connected, and persisted for retrieval when they reconnect.
- aid: nakama:nakama-rpc-runtime-api
  name: Nakama RPC and Runtime API
  tags:
  - RPC
  - Runtime
  - Custom Logic
  - Serverless
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://heroiclabs.com/docs/nakama/server-framework/basics/
  baseURL: http://127.0.0.1:7350/v2
  properties:
  - url: https://heroiclabs.com/docs/nakama/server-framework/basics/
    type: Documentation
  - url: https://heroiclabs.com/docs/nakama/server-framework/introduction/
    type: Documentation
  - url: openapi/nakama-openapi.yml
    type: OpenAPI
  description: Invokes custom server-side functions (RPCs) registered in the Nakama
    runtime over HTTP GET or POST, callable with a session token or, for server-to-server
    calls, an HTTP key query parameter. Runtime functions are authored in Go,
    TypeScript/JavaScript, or Lua.
- aid: nakama:nakama-realtime-api
  name: Nakama Realtime Socket API
  tags:
  - Realtime
  - WebSocket
  - Multiplayer
  - Matchmaking
  - Chat
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://heroiclabs.com/docs/nakama/concepts/client-relayed-multiplayer/
  baseURL: ws://127.0.0.1:7350/ws
  properties:
  - url: https://heroiclabs.com/docs/nakama/concepts/client-relayed-multiplayer/
    type: Documentation
  - url: https://heroiclabs.com/docs/nakama/concepts/matches/
    type: Documentation
  - url: asyncapi/nakama-asyncapi.yml
    type: AsyncAPI
  description: Persistent WebSocket connection carrying realtime features - status
    presence, realtime chat channels, relayed and authoritative multiplayer matches,
    matchmaking, parties, and realtime notification delivery - as envelope messages
    authenticated with a session token supplied as a query parameter on connect.
- aid: nakama:nakama-console-api
  name: Nakama Console API
  tags:
  - Console
  - Administration
  - Operations
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://heroiclabs.com/docs/nakama/getting-started/console-overview/
  baseURL: http://127.0.0.1:7350/v2/console
  properties:
  - url: https://heroiclabs.com/docs/nakama/getting-started/console-overview/
    type: Documentation
  description: Administrative API behind the Nakama Developer Console for managing
    users, storage, leaderboards, matches, runtime configuration, and server status.
    It is an internal operations surface (not published as a stable public client
    contract) authenticated with console credentials, and is documented here for
    completeness rather than for third-party client integration.

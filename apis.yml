apis:
- aid: nakama:nakama-authentication-api
  name: Nakama Authentication API
  tags:
  - Authentication
  - Accounts
  - Sessions
  - OAuth
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://heroiclabs.com/docs/nakama/concepts/authentication/
  baseURL: http://127.0.0.1:7350/v2
  properties:
  - url: https://heroiclabs.com/docs/nakama/concepts/authentication/
    type: Documentation
  - url: https://heroiclabs.com/docs/nakama/api/
    type: APIReference
  - url: openapi/nakama-openapi.yml
    type: OpenAPI
  description: Authenticates players and issues session tokens. Supports device ID,
    email/password, username, custom ID, Apple, Google, Facebook, Facebook Instant
    Games, Game Center, Steam, and refresh-token flows. Server key HTTP Basic auth
    guards authentication endpoints; a JWT session token authorizes all other calls.
- aid: nakama:nakama-account-api
  name: Nakama Account API
  tags:
  - Accounts
  - Users
  - Profile
  - Linking
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://heroiclabs.com/docs/nakama/concepts/user-accounts/
  baseURL: http://127.0.0.1:7350/v2
  properties:
  - url: https://heroiclabs.com/docs/nakama/concepts/user-accounts/
    type: Documentation
  - url: openapi/nakama-openapi.yml
    type: OpenAPI
  description: Reads and updates the authenticated user's account, fetches other user
    profiles, deletes the account, and links or unlinks external identity providers
    (device, email, Apple, Google, Facebook, Game Center, Steam, custom) to a single
    account.
- aid: nakama:nakama-social-api
  name: Nakama Friends and Groups API
  tags:

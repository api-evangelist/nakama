aid: nakama
url: https://raw.githubusercontent.com/api-evangelist/nakama/refs/heads/main/apis.yml
name: Nakama
kind: company
description: Nakama by Heroic Labs is an open-source (Apache-2.0) game and app backend
  server providing user accounts and authentication, social features (friends,
  groups, chat), collaborative storage, realtime multiplayer and authoritative
  matches, matchmaking, leaderboards and tournaments, notifications, and a server
  runtime with custom RPCs in Go, TypeScript/JavaScript, and Lua. Nakama exposes a
  gRPC-gateway-generated REST API plus a realtime WebSocket socket API, and is
  available self-hosted or as the managed Heroic Cloud.

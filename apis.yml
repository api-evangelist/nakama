  - url: https://heroiclabs.com/docs/nakama/concepts/groups-clans/
    type: Documentation
  - url: openapi/nakama-openapi.yml
    type: OpenAPI
  description: Manages the social graph - add, list, delete, and block friends;
    import friends from Facebook and Steam; create, update, list, join, and leave
    groups (clans); manage group membership, promotions, demotions, and bans.
- aid: nakama:nakama-storage-api
  name: Nakama Storage API
  tags:
  - Storage
  - Objects
  - Save Games
  - Persistence
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://heroiclabs.com/docs/nakama/concepts/collections/
  baseURL: http://127.0.0.1:7350/v2
  properties:
  - url: https://heroiclabs.com/docs/nakama/concepts/collections/
    type: Documentation
  - url: openapi/nakama-openapi.yml
    type: OpenAPI
  description: Reads, writes, lists, and deletes JSON storage objects organized into
    collections and keyed per user, with per-object owner and public read/write
    permissions and optimistic-concurrency version checks. Backs save games,
    inventories, and shared app state.
- aid: nakama:nakama-leaderboards-tournaments-api
  name: Nakama Leaderboards and Tournaments API
  tags:
  - Leaderboards
  - Tournaments
